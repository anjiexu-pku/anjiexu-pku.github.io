  <section class="cp-map__detail" aria-live="polite">
    <div class="cp-map__panel is-active" id="cam-map-panel-overview" role="tabpanel" aria-labelledby="cam-map-tab-overview" data-cam-panel="overview">
      <p class="cp-map__panel-kicker">Topology</p>
      <p class="cp-map__panel-title">先分清“世界怎样生成像素”和“模型怎样解释像素”</p>
      <p>几何、光学、光线场和光度分解不是四个串行模块，而是从同一观测出发、面向不同潜变量的后验问题。实线是运行时的数据或推断关系；灰色虚线是训练目标；红色回路表示根据任务风险反向设计曝光、孔径、焦点或编码光学。</p>
    </div>

    <div class="cp-map__panel" id="cam-map-panel-geometry" role="tabpanel" aria-labelledby="cam-map-tab-geometry" data-cam-panel="geometry" hidden>
      <p class="cp-map__panel-kicker">Geometry posterior</p>
      <p class="cp-map__panel-title">网络在近似对应、三角化和 bundle adjustment</p>
      <p>SfM-Learner 把重投影写成自监督；DROID-SLAM 把 dense BA 放进可微迭代；BARF 联合优化位姿与辐射场；DUSt3R 直接回归 pointmap，再用全局对齐恢复共同坐标系。</p>
      <p class="cp-map__paper-links">
        <a href="https://openaccess.thecvf.com/content_cvpr_2017/html/Zhou_Unsupervised_Learning_of_CVPR_2017_paper.html" target="_blank" rel="noopener noreferrer">SfM-Learner [4]</a><span aria-hidden="true"> · </span>
        <a href="https://proceedings.neurips.cc/paper_files/paper/2021/hash/89fcd07f20b6785b92134bd6c1d0fa42-Abstract.html" target="_blank" rel="noopener noreferrer">DROID-SLAM [5]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content/ICCV2021/html/Lin_BARF_Bundle-Adjusting_Neural_Radiance_Fields_ICCV_2021_paper.html" target="_blank" rel="noopener noreferrer">BARF [6]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content/CVPR2024/html/Wang_DUSt3R_Geometric_3D_Vision_Made_Easy_CVPR_2024_paper.html" target="_blank" rel="noopener noreferrer">DUSt3R [7]</a>
      </p>
    </div>

    <div class="cp-map__panel" id="cam-map-panel-optics" role="tabpanel" aria-labelledby="cam-map-tab-optics" data-cam-panel="optics" hidden>
      <p class="cp-map__panel-kicker">Optics and exposure</p>
      <p class="cp-map__panel-title">PSF、光子预算和饱和决定 likelihood</p>
      <p>Deep Optics 直接优化可制造的光学编码；SID 在短曝光 RAW 的 Poisson-Gaussian likelihood 下学习恢复；Dual/Quad Pixel 方法增加子孔径相位观测，缩小失焦反演的零空间。</p>
      <p class="cp-map__paper-links">
        <a href="https://openaccess.thecvf.com/content_ICCV_2019/html/Chang_Deep_Optics_for_Monocular_Depth_Estimation_and_3D_Object_Detection_ICCV_2019_paper.html" target="_blank" rel="noopener noreferrer">Deep Optics [8]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content_cvpr_2018/html/Chen_Learning_to_See_CVPR_2018_paper.html" target="_blank" rel="noopener noreferrer">SID [9]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content/ICCV2021/html/Abuolaim_Learning_To_Reduce_Defocus_Blur_by_Realistically_Modeling_Dual-Pixel_Data_ICCV_2021_paper.html" target="_blank" rel="noopener noreferrer">Dual Pixel [12]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content/CVPR2025/html/Chen_Quad-Pixel_Image_Defocus_Deblurring_A_New_Benchmark_and_Model_CVPR_2025_paper.html" target="_blank" rel="noopener noreferrer">Quad Pixel [13]</a>
      </p>
    </div>

    <div class="cp-map__panel" id="cam-map-panel-rays" role="tabpanel" aria-labelledby="cam-map-tab-rays" data-cam-panel="rays" hidden>
      <p class="cp-map__panel-kicker">Ray representation</p>
      <p class="cp-map__panel-title">焦点堆栈、光场与 NeRF 保留的是不同结构</p>
      <p>焦点堆栈提供多个 shear-and-integrate 投影；EPI 网络显式利用斜率；Light Field Network 直接参数化射线函数；NeRF 先参数化三维密度与方向相关辐射，再通过体渲染产生射线颜色。</p>
      <p class="cp-map__paper-links">
        <a href="https://cseweb.ucsd.edu/~viscomp/projects/LF/papers/SIGASIA16/" target="_blank" rel="noopener noreferrer">LF View Synthesis [16]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content_iccv_2017/html/Srinivasan_Learning_to_Synthesize_ICCV_2017_paper.html" target="_blank" rel="noopener noreferrer">4D RGBD LF [17]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content_cvpr_2018/html/Shin_EPINET_A_Fully-Convolutional_CVPR_2018_paper.html" target="_blank" rel="noopener noreferrer">EPINET [18]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content/CVPR2022/html/Yang_Deep_Depth_From_Focus_With_Differential_Focus_Volume_CVPR_2022_paper.html" target="_blank" rel="noopener noreferrer">DFV [19]</a><span aria-hidden="true"> · </span>
        <a href="https://papers.nips.cc/paper/2021/hash/a11ce019e96a4c60832eadd755a17a58-Abstract.html" target="_blank" rel="noopener noreferrer">LFN [21]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2003.08934" target="_blank" rel="noopener noreferrer">NeRF [22]</a>
      </p>
    </div>

    <div class="cp-map__panel" id="cam-map-panel-photometry" role="tabpanel" aria-labelledby="cam-map-tab-photometry" data-cam-panel="photometry" hidden>
      <p class="cp-map__panel-kicker">Inverse rendering</p>
      <p class="cp-map__panel-title">“看起来一致”不等于形状、材质和光照可辨识</p>
      <p>PS-FCN 用对输入光照排列不敏感的聚合器处理多光照；UniPS 用全局 lighting context 替代显式标定；NeRFactor 与 TensoIR 则把法线、可见性、反照率、BRDF 和环境光写成受约束的神经场。</p>
      <p class="cp-map__paper-links">
        <a href="https://openaccess.thecvf.com/content_ECCV_2018/html/Guanying_Chen_PS-FCN_A_Flexible_ECCV_2018_paper.html" target="_blank" rel="noopener noreferrer">PS-FCN [23]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content/CVPR2022/html/Ikehata_Universal_Photometric_Stereo_Network_Using_Global_Lighting_Contexts_CVPR_2022_paper.html" target="_blank" rel="noopener noreferrer">UniPS [24]</a><span aria-hidden="true"> · </span>
        <a href="https://xiuming.info/projects/nerfactor/" target="_blank" rel="noopener noreferrer">NeRFactor [25]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content/CVPR2023/html/Jin_TensoIR_Tensorial_Inverse_Rendering_CVPR_2023_paper.html" target="_blank" rel="noopener noreferrer">TensoIR [26]</a>
      </p>
    </div>

    <div class="cp-map__panel" id="cam-map-panel-codesign" role="tabpanel" aria-labelledby="cam-map-tab-codesign" data-cam-panel="codesign" hidden>
      <p class="cp-map__panel-kicker">Acquisition co-design</p>
      <p class="cp-map__panel-title">最优相机由任务风险定义，而不只由“照片好看”定义</p>
      <p>Deep Optics 优化镜片或相位编码；Neural Auto-Exposure 根据检测风险选择曝光；Neural Exposure Fusion 保留多曝光观测，在特征域按位置选择信息。它们共同修改的是测量动作 a，而不只是后端网络。</p>
      <p class="cp-map__paper-links">
        <a href="https://openaccess.thecvf.com/content_ICCV_2019/html/Chang_Deep_Optics_for_Monocular_Depth_Estimation_and_3D_Object_Detection_ICCV_2019_paper.html" target="_blank" rel="noopener noreferrer">Deep Optics [8]</a><span aria-hidden="true"> · </span>
        <a href="https://light.princeton.edu/publication/neural_auto_exposure/" target="_blank" rel="noopener noreferrer">Neural Auto-Exposure [10]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content/CVPR2024/html/Onzon_Neural_Exposure_Fusion_for_High-Dynamic_Range_Object_Detection_CVPR_2024_paper.html" target="_blank" rel="noopener noreferrer">Neural Exposure Fusion [11]</a>
      </p>
    </div>
  </section>

<script>
  (function () {
    function initCameraMaps() {
      document.querySelectorAll('[data-cam-map]').forEach(function (map) {
        if (map.dataset.camReady === 'true') return;
        map.dataset.camReady = 'true';
        var controls = Array.from(map.querySelectorAll('[data-cam-lens]'));
        var panels = Array.from(map.querySelectorAll('[data-cam-panel]'));
        var selectableNodes = Array.from(map.querySelectorAll('[data-cam-select]'));

        function activate(lens) {
          map.dataset.activeLens = lens;
          controls.forEach(function (control) {
            var active = control.dataset.camLens === lens;
            control.classList.toggle('is-active', active);
            control.setAttribute('aria-selected', String(active));
            control.tabIndex = active ? 0 : -1;
          });
          panels.forEach(function (panel) {
            var active = panel.dataset.camPanel === lens;
            panel.classList.toggle('is-active', active);
            panel.hidden = !active;
          });
        }

        controls.forEach(function (control) {
          control.addEventListener('click', function () {
            activate(control.dataset.camLens);
          });
          control.addEventListener('keydown', function (event) {
            var index = controls.indexOf(control);
            var nextIndex = null;
            if (event.key === 'ArrowRight') nextIndex = (index + 1) % controls.length;
            if (event.key === 'ArrowLeft') nextIndex = (index - 1 + controls.length) % controls.length;
            if (event.key === 'Home') nextIndex = 0;
            if (event.key === 'End') nextIndex = controls.length - 1;
            if (nextIndex !== null) {
              event.preventDefault();
              controls[nextIndex].focus();
              activate(controls[nextIndex].dataset.camLens);
            }
          });
        });

        selectableNodes.forEach(function (node) {
          function selectNode() {
            activate(node.dataset.camSelect);
          }
          node.addEventListener('click', selectNode);
          node.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              selectNode();
            }
          });
        });

        activate(map.dataset.activeLens || 'overview');
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initCameraMaps);
    } else {
      initCameraMaps();
    }
  }());
</script>
