  <section class="isp-map__detail" aria-live="polite">
    <div class="isp-map__panel is-active" id="isp-map-panel-overview" role="tabpanel" aria-labelledby="isp-map-tab-overview" data-isp-panel="overview">
      <p class="isp-map__panel-kicker">Topology</p>
      <p class="isp-map__panel-title">这是一张分叉、汇合与回路并存的图</p>
      <p>场景同时生成 RAW 观测和参考目标；Forward ISP 在点估计、恢复/渲染分解、生成式三条<strong>替代</strong>路径中选择一种；Reverse ISP 是回到 RAW 域的旁路；任务也可以绕过 sRGB，直接读取 RAW 表示。</p>
    </div>

    <div class="isp-map__panel" id="isp-map-panel-observation" role="tabpanel" aria-labelledby="isp-map-tab-observation" data-isp-panel="observation" hidden>
      <p class="isp-map__panel-kicker">Observation and data</p>
      <p class="isp-map__panel-title">改变 p(R | X,m) 或训练联合分布</p>
      <p>这一组不把 RAW 当作普通输入图像，而是关注 CFA、噪声、曝光、合成数据与 RAW 先验。点击论文名可打开原文。</p>
      <p class="isp-map__paper-links">
        <a href="https://research.nvidia.com/publication/2014-12_flexisp-flexible-camera-image-processing-framework" target="_blank" rel="noopener noreferrer" title="FlexISP: A Flexible Camera Image Processing Framework">FlexISP [1]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content_CVPR_2019/html/Brooks_Unprocessing_Images_for_Learned_Raw_Denoising_CVPR_2019_paper.html" target="_blank" rel="noopener noreferrer" title="Unprocessing Images for Learned Raw Denoising">Unprocessing [8]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content_CVPR_2020/html/Zamir_CycleISP_Real_Image_Restoration_via_Improved_Data_Synthesis_CVPR_2020_paper.html" target="_blank" rel="noopener noreferrer" title="CycleISP: Real Image Restoration via Improved Data Synthesis">CycleISP [9]</a><span aria-hidden="true"> · </span>
        <a href="https://www.microsoft.com/en-us/research/publication/joint-demosaicing-and-denoising-via-learned-non-parametric-random-fields/" target="_blank" rel="noopener noreferrer" title="Joint Demosaicing and Denoising via Learned Non-parametric Random Fields">Learned Random Fields [13]</a><span aria-hidden="true"> · </span>
        <a href="https://www.aimsciences.org/article/doi/10.3934/ipi.2023044" target="_blank" rel="noopener noreferrer" title="How to Best Combine Demosaicing and Denoising?">Demosaicing / Denoising Order [14]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2009.06205" target="_blank" rel="noopener noreferrer" title="Joint Demosaicking and Denoising Benefits from a Two-stage Training Strategy">Two-stage Training [15]</a><span aria-hidden="true"> · </span>
        <a href="https://light.princeton.edu/publication/allyouneedisraw/" target="_blank" rel="noopener noreferrer" title="All You Need is RAW">All You Need Is RAW [24]</a>
      </p>
    </div>

    <div class="isp-map__panel" id="isp-map-panel-direct" role="tabpanel" aria-labelledby="isp-map-tab-direct" data-isp-panel="direct" hidden>
      <p class="isp-map__panel-kicker">Direct point estimation</p>
      <p class="isp-map__panel-title">用一个前向函数近似 Bayes 决策</p>
      <p>这条路径学习 <code>F(R) -> Y-hat</code>，通常对应 L1/L2 下的条件统计量。CNN、U-Net 与 Transformer 是这里的空间算子或隐式先验，不是额外的 ISP 串行阶段。</p>
      <p class="isp-map__paper-links">
        <a href="https://groups.csail.mit.edu/graphics/demosaicnet/" target="_blank" rel="noopener noreferrer" title="Deep Joint Demosaicking and Denoising">Deep Joint [2]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/1801.06724" target="_blank" rel="noopener noreferrer" title="DeepISP: Toward Learning an End-to-End Image Processing Pipeline">DeepISP [3]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/1805.01934" target="_blank" rel="noopener noreferrer" title="Learning to See in the Dark">SID / LSID [4]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content_CVPRW_2020/papers/w31/Ignatov_Replacing_Mobile_Camera_ISP_With_a_Single_Deep_Learning_Model_CVPRW_2020_paper.pdf" target="_blank" rel="noopener noreferrer" title="Replacing Mobile Camera ISP with a Single Deep Learning Model">PyNET / RISP [5]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/1505.04597" target="_blank" rel="noopener noreferrer" title="U-Net: Convolutional Networks for Biomedical Image Segmentation">U-Net [11]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2108.10257" target="_blank" rel="noopener noreferrer" title="SwinIR: Image Restoration Using Swin Transformer">SwinIR [27]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2106.03106" target="_blank" rel="noopener noreferrer" title="Uformer: A General U-Shaped Transformer for Image Restoration">Uformer [28]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2111.09881" target="_blank" rel="noopener noreferrer" title="Restormer: Efficient Transformer for High-Resolution Image Restoration">Restormer [29]</a>
      </p>
    </div>

    <div class="isp-map__panel" id="isp-map-panel-factorized" role="tabpanel" aria-labelledby="isp-map-tab-factorized" data-isp-panel="factorized" hidden>
      <p class="isp-map__panel-kicker">Factorized pipeline</p>
      <p class="isp-map__panel-title">把恢复与渲染写成不同的条件分布</p>
      <p>这条路径假设 <code>p(Y,S | R) = p(Y | S)p(S | R)</code>。中间变量 S 不是“多一个网络层”，而是可辨识性、信息保留和模块约束的来源；PnP、RED 与 DIP 主要对应其中的恢复推理。</p>
      <p class="isp-map__paper-links">
        <a href="https://arxiv.org/abs/1908.01481" target="_blank" rel="noopener noreferrer" title="CameraNet: A Two-Stage Framework for Effective Camera ISP Learning">CameraNet [6]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content/ICCV2021/papers/Yu_ReconfigISP_Reconfigurable_Camera_Image_Processing_Pipeline_ICCV_2021_paper.pdf" target="_blank" rel="noopener noreferrer" title="ReconfigISP: Reconfigurable Camera Image Processing Pipeline">ReconfigISP [7]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2206.08488" target="_blank" rel="noopener noreferrer" title="Controllable Image Enhancement">Controllable Enhancement [12]</a><span aria-hidden="true"> · </span>
        <a href="https://docs.lib.purdue.edu/ecetr/448/" target="_blank" rel="noopener noreferrer" title="Plug-and-Play Priors for Model Based Reconstruction">Plug-and-Play [16]</a><span aria-hidden="true"> · </span>
        <a href="https://epubs.siam.org/doi/10.1137/16M1102884" target="_blank" rel="noopener noreferrer" title="RED [Regularization by Denoising]">RED [17]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2008.00226" target="_blank" rel="noopener noreferrer" title="Regularization by Denoising via Fixed-Point Projection">RED-PRO [18]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content_cvpr_2018/html/Ulyanov_Deep_Image_Prior_CVPR_2018_paper.html" target="_blank" rel="noopener noreferrer" title="Deep Image Prior">Deep Image Prior [19]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2008.13751" target="_blank" rel="noopener noreferrer" title="Plug-and-Play Image Restoration with Deep Denoiser Prior">DPIR [20]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2201.03210" target="_blank" rel="noopener noreferrer" title="Model-Based Image Signal Processors via Learnable Dictionaries">Learnable Dictionaries [21]</a>
      </p>
    </div>

    <div class="isp-map__panel" id="isp-map-panel-generative" role="tabpanel" aria-labelledby="isp-map-tab-generative" data-isp-panel="generative" hidden>
      <p class="isp-map__panel-kicker">Conditional distribution</p>
      <p class="isp-map__panel-title">从一个点输出，转向完整的 q(Y | R,u)</p>
      <p>Diffusion 学 score，Flow Matching 学概率路径的 velocity。它们可以共享 U-Net 或 Transformer 骨干；差别在于学习的随机过程，不在于“又多了一个串行模块”。</p>
      <p class="isp-map__paper-links">
        <a href="https://arxiv.org/abs/2006.11239" target="_blank" rel="noopener noreferrer" title="Denoising Diffusion Probabilistic Models">DDPM [30]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2011.13456" target="_blank" rel="noopener noreferrer" title="Score-Based Generative Modeling through Stochastic Differential Equations">Score SDE [31]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2201.11793" target="_blank" rel="noopener noreferrer" title="Denoising Diffusion Restoration Models">DDRM [32]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2209.14687" target="_blank" rel="noopener noreferrer" title="Diffusion Posterior Sampling for General Noisy Inverse Problems">DPS [33]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2210.02747" target="_blank" rel="noopener noreferrer" title="Flow Matching for Generative Modeling">Flow Matching [34]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2209.03003" target="_blank" rel="noopener noreferrer" title="Rectified Flow">Rectified Flow [35]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2302.00482" target="_blank" rel="noopener noreferrer" title="Improving and Generalizing Flow-Based Generative Models with Minibatch Optimal Transport">Minibatch OT / CFM [36]</a><span aria-hidden="true"> · </span>
        <a href="https://arxiv.org/abs/2503.19283" target="_blank" rel="noopener noreferrer" title="ISPDiffuser: Learning RAW-to-sRGB Mappings with Texture-Aware Diffusion Models and Histogram-Guided Color Consistency">ISPDiffuser [37]</a>
      </p>
    </div>

    <div class="isp-map__panel" id="isp-map-panel-reverse" role="tabpanel" aria-labelledby="isp-map-tab-reverse" data-isp-panel="reverse" hidden>
      <p class="isp-map__panel-kicker">Reverse conditional</p>
      <p class="isp-map__panel-title">RGB-to-RAW 是后验估计，不是普通反函数</p>
      <p>标准 ISP 含量化、裁剪、tone mapping 与压缩，通常不可逆。Reverse ISP 因而是一条为数据合成、循环一致性和信息保留服务的旁路。</p>
      <p class="isp-map__paper-links">
        <a href="https://openaccess.thecvf.com/content_CVPR_2019/html/Brooks_Unprocessing_Images_for_Learned_Raw_Denoising_CVPR_2019_paper.html" target="_blank" rel="noopener noreferrer" title="Unprocessing Images for Learned Raw Denoising">Unprocessing [8]</a><span aria-hidden="true"> · </span>
        <a href="https://openaccess.thecvf.com/content_CVPR_2020/html/Zamir_CycleISP_Real_Image_Restoration_via_Improved_Data_Synthesis_CVPR_2020_paper.html" target="_blank" rel="noopener noreferrer" title="CycleISP: Real Image Restoration via Improved Data Synthesis">CycleISP [9]</a><span aria-hidden="true"> · </span>

<script>
  (function () {
    function initIspMaps() {
      document.querySelectorAll('[data-isp-map]').forEach(function (map) {
        map.dataset.ispReady = 'true';
        var controls = Array.from(map.querySelectorAll('[data-isp-lens]'));
        var panels = Array.from(map.querySelectorAll('[data-isp-panel]'));
        var selectableNodes = Array.from(map.querySelectorAll('[data-isp-select]'));

        function activate(lens) {
          map.dataset.activeLens = lens;
          controls.forEach(function (control) {
            var active = control.dataset.ispLens === lens;
            control.classList.toggle('is-active', active);
            control.setAttribute('aria-selected', String(active));
            control.tabIndex = active ? 0 : -1;
          });
          panels.forEach(function (panel) {
            var active = panel.dataset.ispPanel === lens;
            panel.classList.toggle('is-active', active);
            panel.hidden = !active;
          });
        }

        controls.forEach(function (control) {
          control.addEventListener('click', function () {
            activate(control.dataset.ispLens);
          });
          control.addEventListener('keydown', function (event) {
            var index = controls.indexOf(control);
            var nextIndex = null;
            if (event.key === 'ArrowRight') nextIndex = (index + 1) % controls.length;
            if (event.key === 'ArrowLeft') nextIndex = (index - 1 + controls.length) % controls.length;
            if (event.key === 'Home') nextIndex = 0;
            if (event.key === 'End') nextIndex = controls.length - 1;
            if (nextIndex !== null) {
              event.preventDefault();
              controls[nextIndex].focus();
              activate(controls[nextIndex].dataset.ispLens);
            }
          });
        });

        selectableNodes.forEach(function (node) {
          function selectNode() {
            activate(node.dataset.ispSelect);
          }
          node.addEventListener('click', selectNode);
          node.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              selectNode();
            }
          });
        });

        activate(map.dataset.activeLens || 'overview');
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initIspMaps);
    } else {
      initIspMaps();
    }
  }());
</script>
