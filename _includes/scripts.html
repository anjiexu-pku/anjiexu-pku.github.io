{% if page.collection == "posts" and page.toc != false %}
  <script src="{{ base_path }}/assets/js/post-sidebar-toc.js"></script>
{% endif %}

<!-- Highlight.js for Lean 4 syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="{{ base_path }}/assets/js/lean.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (!window.hljs) return;
    document.querySelectorAll('div.language-lean pre code, pre code.language-lean').forEach(function(block) {
      var result = hljs.highlight(block.textContent, { language: 'lean' });
      block.className = 'hljs language-lean';
      block.innerHTML = result.value;
    });
  });
</script>

<!-- Mermaid support -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      themeVariables: {
        fontFamily: 'trebuchet ms, verdana, arial, sans-serif;',
        fontSize: '16px',
        darkMode: false
      },
      flowchart: {
        useMaxWidth: true,
        htmlLabels: true,
        curve: 'basis'
      }
    });
    
    // Find all code blocks with class 'language-mermaid' and replace them with mermaid diagrams
    const mermaidBlocks = document.querySelectorAll('code.language-mermaid');
    mermaidBlocks.forEach((block, index) => {
      const mermaidCode = block.textContent;
      const mermaidDiv = document.createElement('div');
      mermaidDiv.className = 'mermaid';
      mermaidDiv.textContent = mermaidCode;
      mermaidDiv.id = 'mermaid-' + index;
      
      // Replace the code block with mermaid div
      block.parentNode.replaceWith(mermaidDiv);
    });
    
    // Re-render mermaid diagrams
    mermaid.init();
  });
</script>
